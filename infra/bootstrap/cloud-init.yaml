#cloud-config
# cloud-init user-data for the agent host. Order matters: create the users and the
# /srv/pwfg layout FIRST, then install the IMDS owner-match lock (it references the
# agent uid), then assert the boundary, then start the proxy and the loop. The heavy
# lifting lives in versioned scripts (bootstrap/bin/*) so this file stays readable;
# on a baked AMI (P2) they are already present, otherwise bootstrap.sh fetches them.
write_files:
  - path: /etc/profile.d/pwfg-umask.sh
    permissions: "0644"
    content: |
      # The agent uses umask 002 so the gov user (shared 'pwfgshare' group) can drive
      # git checkpoints / recovery on the agent-owned workspace.
      if [ "$(id -un)" = "agent" ]; then umask 002; fi

runcmd:
  - set -euxo pipefail
  - /opt/pwfg/bootstrap/bin/bootstrap.sh
  - PWFG_AGENT_USER=agent /opt/pwfg/bootstrap/bin/imds-lock.sh
  # Fence the agent uid to loopback-only BEFORE any agent session can start.
  - PWFG_AGENT_USER=agent /opt/pwfg/bootstrap/bin/egress-lock.sh
  - systemctl daemon-reload
  # Re-apply both owner-match locks on every subsequent boot (first boot applied them above).
  - systemctl enable --now pwfg-imds-lock.service
  - systemctl enable --now pwfg-egress-lock.service
  # Fetch the brokered key to /run/pwfg BEFORE boot-assert (which fails the boot if it
  # is absent) and the proxy (which LoadCredential=s it).
  - systemctl enable --now pwfg-key-fetch.service
  - systemctl enable --now pwfg-boot-assert.service
  - systemctl enable --now pwfg-proxy.service
  - systemctl enable --now pwfg-loop.service
