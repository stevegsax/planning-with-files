#cloud-config
# user-data for the EGRESS box ONLY (the t4g.nano Squid forward proxy). This file is
# rendered into the Squid instance's user-data by EgressStack; it is never installed on
# the agent host. Squid is the box's single, domain-allowlisted path to the internet:
# the on-box brokering proxy CONNECT-tunnels api.anthropic.com through it, so TLS stays
# end-to-end to Anthropic and Squid only ever sees/enforces the CONNECT host. The agent
# uid cannot reach this box at all (the on-box egress-lock owner-match drops every
# non-loopback packet from the agent); only the proxy/gov/root uids originate CONNECTs.
write_files:
  - path: /etc/squid/squid.conf
    permissions: "0644"
    content: |
      # --- pwfg egress forward proxy: CONNECT to an explicit-host allowlist only ---
      # Match the CONNECT host EXACTLY (api.anthropic.com), never a .anthropic.com
      # wildcard subtree, to minimize any domain-fronting surface.
      acl SSL_ports port 443
      acl CONNECT method CONNECT
      acl anthropic dstdomain api.anthropic.com
      # Belt-and-suspenders behind the SG: only the agent host's isolated subnet may
      # use the proxy (a real second barrier independent of the SG, not the whole VPC).
      # This is the default PRIVATE_ISOLATED /24; adjust if you re-CIDR the subnet.
      acl pwfg_src src 10.0.0.0/24

      # === TEST-1 PRIMING BROADENING (default OFF — steady state is anthropic-only) ===
      # To prime the agent box once (install toolchain + warm the offline uv cache),
      # UNCOMMENT these acls AND the matching `http_access allow` lines below on the
      # RUNNING Squid box, `systemctl reload squid`, prime, then RE-COMMENT both + reload
      # to re-fence. See squid-test1-priming.conf.snippet for the paste-in + re-verify.
      # Substitute your DEPLOY REGION into al2023. boot-assert does NOT check this — a
      # forgotten-open broadening is the real risk, so re-fence + re-verify
      # (curl -x http://127.0.0.1:3128 https://pypi.org -> 403) before the run.
      #acl uv_install     dstdomain astral.sh releases.astral.sh
      #acl gh             dstdomain github.com objects.githubusercontent.com release-assets.githubusercontent.com
      #acl pypi           dstdomain pypi.org files.pythonhosted.org
      #acl al2023         dstdomain al2023-repos-<region>-de612dc2.s3.<region>.amazonaws.com al2023-repos-<region>-de612dc2.s3.dualstack.<region>.amazonaws.com
      #acl claude_install dstdomain claude.ai downloads.claude.ai

      # Permit ONLY CONNECT (no plain HTTP forward-proxying), only to 443, only from
      # the in-VPC source, only to the allowlisted host. Everything else is denied.
      http_access deny !CONNECT
      http_access deny CONNECT !SSL_ports
      http_access deny !pwfg_src
      http_access allow pwfg_src CONNECT anthropic SSL_ports
      # TEST-1 allows — uncomment WITH the acls above (these sit ABOVE `deny all` so they
      # take effect); re-comment to re-fence.
      #http_access allow pwfg_src CONNECT uv_install SSL_ports
      #http_access allow pwfg_src CONNECT gh SSL_ports
      #http_access allow pwfg_src CONNECT pypi SSL_ports
      #http_access allow pwfg_src CONNECT al2023 SSL_ports
      #http_access allow pwfg_src CONNECT claude_install SSL_ports
      http_access deny all

      http_port 3128
      # We only tunnel CONNECT; there is nothing to cache.
      cache deny all
      # Do not advertise the box; quieten access noise to the audit minimum.
      httpd_suppress_version_string on
      forwarded_for delete

runcmd:
  # Retry the install: even with the CFN route/association dependency, route
  # propagation can lag the instance boot by seconds. No `set -e` — we WANT to retry,
  # not abort, on a transient 'no route to host' so a brief delay can't wedge the box.
  - |
    set -uxo pipefail
    for i in 1 2 3 4 5 6; do
      dnf install -y squid && break
      echo "squid install attempt $i failed (egress route not ready?); retrying..." >&2
      sleep 15
    done
    systemctl enable --now squid
